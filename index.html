<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>代步車登記系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background-color: #f8f9fc; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      .card { background-color: #ffffff; width: 380px; max-width: 90%; padding: 40px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); text-align: center; box-sizing: border-box; }
      .card h1 { font-size: 24px; color: #333; margin: 0 0 8px 0; }
      .card p { font-size: 14px; color: #666; margin: 0 0 25px 0; }
      .form-group { text-align: left; margin-bottom: 20px; }
      .form-group label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; font-weight: 500; }
      .form-group input { width: 100%; height: 48px; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 14px; box-sizing: border-box; }
      .form-group input:focus { outline: none; border-color: #4a6bff; }
      .uppercase-input { text-transform: uppercase; }
      
      .btn { width: 100%; height: 56px; background-color: #4a6bff; color: #ffffff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s;}
      .btn:disabled { background-color: #a0b0ff; cursor: not-allowed; }
      
      #successScreen { display: none; }
      .success-icon { font-size: 60px; color: #28a745; margin-bottom: 20px; }

      /* --- 優化：建立一個絕對攔截的點擊區域 --- */
      .rules-click-area { display: flex; align-items: center; margin-bottom: 20px; text-align: left; padding: 10px; background-color: #f1f4ff; border-radius: 12px; cursor: pointer; border: 1px solid #e0e0e0;}
      .rules-click-area input[type="checkbox"] { width: 20px; height: 20px; margin: 0 10px 0 0; pointer-events: none; /* 讓框框本身失去感應，由外層區域全權接管 */ }
      .rules-click-area label { font-size: 14px; color: #333; margin: 0; pointer-events: none; }
      .fake-link { color: #4a6bff; text-decoration: underline; font-weight: bold; }

      .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
      .modal-content { background-color: #fff; width: 85%; max-width: 400px; border-radius: 20px; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; max-height: 80vh; }
      .modal-content h2 { margin-top: 0; font-size: 20px; color: #333; text-align: center; margin-bottom: 15px;}
      .rules-text { overflow-y: auto; text-align: left; font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; padding-right: 5px;}
      .btn-agree { background-color: #28a745; }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="formScreen">
        <h1>代步車登記系統</h1>
        <p>請確認資訊並完成登記</p>
        <form id="registerForm">
          <div class="form-group"><label>登記日期</label><input type="text" id="date" readonly style="border:none; background:#e0e0e0; color:#666;"></div>
          <div class="form-group"><label>借車人姓名</label><input type="text" id="userName" required></div>
          <div class="form-group"><label>聯絡電話</label><input type="tel" id="userPhone" required></div>
          <div class="form-group"><label>您的車牌號碼（原車）</label><input type="text" id="originalCarId" class="uppercase-input" required></div>
          <div class="form-group"><label>借出之代步車車牌</label><input type="text" id="scooterId" class="uppercase-input" required></div>
          
          <div class="rules-click-area" id="rulesWrapper">
            <input type="checkbox" id="agreeRules" required>
            <label>我已閱讀並同意 <span class="fake-link">借用代步車規範</span></label>
          </div>

          <button type="submit" class="btn" id="submitBtn">確認送出</button>
        </form>
      </div>

      <div id="successScreen">
        <div class="success-icon">✅</div>
        <h1>處理中...</h1>
        <p>正在同步資料並發送訊息</p>
      </div>
    </div>

    <div id="rulesModal" class="modal-overlay">
      <div class="modal-content">
        <h2>借用代步車規範</h2>
        <div class="rules-text">
          <p>1. 借用期間請妥善保管並愛惜車輛。<br>
          2. 若發生交通事故或車輛損壞，借用人需負擔相關賠償責任。<br>
          3. 借用期間產生之交通違規罰鍰，由借用人全額負擔。<br>
          4. 請遵守交通規則，騎乘務必配戴安全帽。<br>
          5. 本車僅提供代步使用，嚴禁轉借他人或從事違法行為。</p>
        </div>
        <button type="button" class="btn btn-agree" id="closeRulesBtn">我已瞭解並同意</button>
      </div>
    </div>

    <script>
      // ==========================================
      const GAS_URL = "https://script.google.com/macros/s/AKfycby2C5Jnn8_uNGh6qAre2gxtOrUAHZbGKlE8L49GE86q015HXcnAFxK8AeMyC332fdXm/exec"; 
      const LIFF_ID = "2009693014-gvLsG5Bj"; 
      // ==========================================

      window.onload = function() {
        const today = new Date();
        document.getElementById('date').value = today.getFullYear() + '-' + 
          String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        liff.init({ liffId: LIFF_ID }).catch(err => console.error("LIFF 初始化失敗", err));
      };

      // --- 絕對防護的點擊邏輯 ---
      const rulesWrapper = document.getElementById('rulesWrapper');
      const modal = document.getElementById('rulesModal');
      const closeBtn = document.getElementById('closeRulesBtn');
      const checkbox = document.getElementById('agreeRules');

      // 1. 點擊整個淺藍色框框，強制打開視窗，並確保不影響打勾狀態
      rulesWrapper.addEventListener('click', function(e) {
        e.preventDefault(); 
        modal.style.display = 'flex';
      });

      // 2. 點擊同意時，寫死為 true
      closeBtn.addEventListener('click', function() {
        modal.style.display = 'none'; 
        checkbox.checked = true; // 強制寫入底層狀態
      });

      // 表單送出邏輯
      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        // 即時抓取底層真實狀態
        const isActuallyChecked = document.getElementById('agreeRules').checked;
        if (!isActuallyChecked) {
          alert("請先點擊閱讀並同意借用代步車規範！");
          return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "資料傳送中...";
        btn.style.opacity = 0.7;
        btn.disabled = true; 

        const data = {
          date: document.getElementById('date').value,
          userName: document.getElementById('userName').value,
          userPhone: document.getElementById('userPhone').value,
          originalCarId: document.getElementById('originalCarId').value.toUpperCase(),
          scooterId: document.getElementById('scooterId').value.toUpperCase()
        };

        document.getElementById('formScreen').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';

        fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors', 
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        })
        .then(() => {
          sendLineMessageAndClose(data);
        })
        .catch(error => {
          alert('網路連線異常，請稍後再試。');
        });
      });

      function sendLineMessageAndClose(data) {
        if (liff.isInClient()) {
          const msg = `【代步車登記完成】\n📅 日期：${data.date}\n👤 姓名：${data.userName}\n📱 電話：${data.userPhone}\n🚗 原車牌：${data.originalCarId}\n🛵 代步車：${data.scooterId}\n\n謝謝您的配合，騎乘請注意安全！`;
          
          liff.sendMessages([{ type: 'text', text: msg }])
            .then(() => { liff.closeWindow(); })
            .catch(err => { alert("權限錯誤：請確認是否已授權傳送訊息。\n" + err.message); });
        } else {
          alert("登記成功！請手動關閉此網頁。");
        }
      }
    </script>
  </body>
</html>
